name: docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/configure-pages@v5
      - name: Install RDMA headers and runtime
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y libefa1 libibverbs-dev ibverbs-providers
      - name: Build packages and install documentation dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -r docs/requirements.txt
          uv pip install --python .venv/bin/python -e ./efa -e ./ibverbs
      - name: Build documentation
        run: .venv/bin/sphinx-build -W --keep-going -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    name: deploy documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
