name: build & publish wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: ibverbs

jobs:
  build_wheels:
    name: manylinux ${{ matrix.arch }} (abi3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (for aarch64)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        with:
          package-dir: ${{ github.workspace }}/ibverbs
          output-dir: ${{ github.workspace }}/wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install rdma-core headers
        run: sudo apt-get update && sudo apt-get install -y libibverbs-dev
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: ibverbs/dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing (no token needed)
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
